<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🔥🍒𝗣𝗥𝗢𝗛𝗜𝗕𝗜𝗗𝗢𝗫𝗫𝗫🍒😈</title>

<style>
:root{
--bg-light:#2c2c2c;
--text:#e6eef6;
--muted:#97a1ac;
--maxWidth:650px;
--btn-cian:#0fc6b0;
--btn-verde:#28a745;
--red-msg:#ff1a1a;
--green-status:#00ff55;
}

html,body{
height:100%;
margin:0;
font-family:Roboto,Inter,system-ui,"Helvetica Neue",Arial;
background:var(--bg-light);
color:var(--text);
}

.app-wrap{
max-width: var(--maxWidth);
width:95%;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
height:100vh;
text-align:center;
position:relative;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,.6);
padding:0 10px;
}

#portada{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:100;
background:url('https://iili.io/fuH81j4.jpg') center/cover no-repeat;
}

#portada::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(6px);
z-index:1;
}

#portada h1,#portada p,#portada .btns{
position:relative;
z-index:2;
}

#portada h1{
color:#fff;
font-size:38px;
font-weight:900;
border:5px solid #fff;
border-radius:50%;
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}

#portada p{
color:#fff;
font-size:16px;
font-weight:800;
margin-bottom:30px;
}

#portada .btns{
display:flex;
gap:12px;
}

#portada button{
width:130px;
padding:9px 0;
border-radius:26px;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

#btn-si{
background:var(--btn-cian);
color:#fff;
border:none;
}

#btn-no{
background:transparent;
color:var(--btn-cian);
border:2px solid var(--btn-cian);
}

#groupSection{
display:none;
opacity:0;
width:100%;
background:rgba(0,0,0,0.85);
padding:20px;
border-radius:20px 20px 0 0;
margin-top:20px;
text-align:center;
transition:opacity 0.5s;
}

.group-photo{
width:80px;
height:80px;
border-radius:50%;
border:2px solid var(--btn-cian);
object-fit:cover;
margin-bottom:8px;
}

.channel-name{
font-size:18px;
font-weight:700;
margin-bottom:4px;
}

.channel-sub{
color:var(--muted);
font-size:14px;
margin-bottom:10px;
}

.mini-thumbs{
display:flex;
justify-content:center;
margin:8px 0;
}

.mini-thumbs img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid #121518;
margin-left:-10px;
}

.channel-info{
color:var(--muted);
font-size:14px;
margin-bottom:10px;
}

#shareBtn,#accessBtn{
background:var(--btn-cian);
border:none;
color:#fff;
padding:10px 20px;
border-radius:25px;
font-weight:700;
cursor:pointer;
}

#accessBtn{
display:none;
background:var(--btn-verde);
margin-top:8px;
}

#message{
color:var(--muted);
font-size:12px;
margin-top:6px;
}

#smallText{
display:none;
color:red;
font-size:11px;
margin-top:4px;
}

#memberCount{
font-weight:normal;
}

.vibrate{
animation:vibrate .3s linear;
}

@keyframes vibrate{
0%{transform:translateX(0)}
25%{transform:translateX(-3px)}
50%{transform:translateX(3px)}
75%{transform:translateX(-3px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div id="portada">
<h1>18+</h1>
<p>Por favor confirme que tiene más de 18 años</p>

<div class="btns">
<button id="btn-si">Tengo 18</button>
<button id="btn-no">Salir</button>
</div>
</div>

<div class="app-wrap">

<div id="groupSection">

<img class="group-photo" src="https://iili.io/KeA5yga.jpg">

<div class="channel-name">🔥🍒𝗣𝗥𝗢𝗛𝗜𝗕𝗜𝗗𝗢𝗫𝗫𝗫🍒😈</div>

<div class="channel-sub">Grupo privado</div>

<div class="mini-thumbs">
<img src="https://iili.io/KOPXQr7.jpg">
<img src="https://iili.io/fh0lW1R.jpg">
<img src="https://iili.io/fh0IW9j.jpg">
</div>

<div class="channel-info">
<span>😎𝐌𝐫 𝐌𝐨𝐧𝐞𝐲</span> ,
<span>Free Group...</span> y
<span id="memberCount">40,250</span> miembros más
</div>

<button id="shareBtn">Compartir 0/5</button>

<button id="accessBtn">Accede al chat 👈</button>

<div id="message">
Debes compartir el enlace 5 veces para acceder
</div>

<div id="smallText"></div>

</div>
</div>

<script>

const portada=document.getElementById("portada");
const groupSection=document.getElementById("groupSection");

document.getElementById("btn-si").onclick=()=>{
portada.style.opacity=0;
setTimeout(()=>{
portada.style.display="none";
groupSection.style.display="block";
setTimeout(()=>groupSection.style.opacity=1,50);
},400);
};

document.getElementById("btn-no").onclick=()=>{
alert("Debes tener más de 18 años para continuar");
};

let shares=0;
const totalShares=5;
let lastClick=0;
const clickDelay=2000;

const shareBtn=document.getElementById("shareBtn");
const accessBtn=document.getElementById("accessBtn");
const message=document.getElementById("message");
const smallText=document.getElementById("smallText");

shareBtn.onclick=()=>{

const now=Date.now();

if(now-lastClick<clickDelay){
alert("Espera unos segundos y vuelve a compartir");
return;
}

lastClick=now;

shares++;

if(shares<=2){
window.open("https://t.me/share/url?url=https://t.me/joinchat/X6Sk_F9fhLo0Yzkx","_blank");
}else{
window.open("https://t.me/share/url?url=👀🍑𝙋𝙖𝙘𝙠𝙨%20𝙁𝙞𝙡𝙩𝙧𝙖𝙙𝙤𝙨🔞🔥%20https://7a6lt.fotox.app/tg?start=5353490913","_blank");
}

shareBtn.textContent=Compartir ${shares}/5;

if(shares===1||shares===2)
message.textContent="Estas cerca, solo comparte un poco más";

else if(shares===3)
message.textContent="Ya casi entras";

else if(shares===4)
message.textContent="Último paso, comparte otra vez";

if(shares>=5){
shareBtn.style.display="none";
accessBtn.style.display="inline-block";
}

};

accessBtn.onclick=()=>{
accessBtn.classList.add("vibrate");
setTimeout(()=>accessBtn.classList.remove("vibrate"),400);

smallText.style.display="block";
smallText.textContent="Recarga la página, comparte el enlace eh intenta de nuevo.";
};

/* CONTADOR DE MIEMBROS */

const INITIAL_MEMBERS=40250;
const DAILY_INCREASE=500;
const MAX_MEMBERS=200000;

let members=parseInt(localStorage.getItem("members"));

if(!members || members>MAX_MEMBERS){
members=INITIAL_MEMBERS;
localStorage.setItem("members",members);
}

let lastDaily=parseInt(localStorage.getItem("lastDaily"))||Date.now();

const memberCount=document.getElementById("memberCount");

function updateMembers(){
memberCount.textContent=members.toLocaleString();
localStorage.setItem("members",members);
}

function dailyIncrease(){

const now=Date.now();

if(now-lastDaily>=86400000){

members=Math.min(members+DAILY_INCREASE,MAX_MEMBERS);

updateMembers();

lastDaily=now;
localStorage.setItem("lastDaily",lastDaily);

}

setTimeout(dailyIncrease,3600000);

}

updateMembers();
dailyIncrease();

</script>

</body>
</html>
